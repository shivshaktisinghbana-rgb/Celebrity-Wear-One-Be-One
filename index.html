
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Celebrity Wear One Be One</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- Header -->
<div id="cw-header"></div>

<!-- HERO SECTION -->
<section class="cw-hero-slider">

<div id="cwHeroCarousel" class="carousel slide" data-bs-ride="carousel">

  <div class="carousel-inner">

    <!-- Slide 1 -->
    <div class="carousel-item active">
      <img src="images/functions/banner1.jpg" class="d-block w-100">
    </div>

    <!-- Slide 2 -->
    <div class="carousel-item">
      <img src="images/functions/banner2.jpeg" class="d-block w-100">
    </div>

    <!-- Slide 3 -->
    <div class="carousel-item">
      <img src="images/functions/banner3.jpeg" class="d-block w-100">
    </div>

  </div>

  <!-- Buttons -->
  <button class="carousel-control-prev" type="button" data-bs-target="#cwHeroCarousel" data-bs-slide="prev">
    <span class="carousel-control-prev-icon"></span>
  </button>

  <button class="carousel-control-next" type="button" data-bs-target="#cwHeroCarousel" data-bs-slide="next">
    <span class="carousel-control-next-icon"></span>
  </button>

</div>

</section>

<!-- Category Sections -->
 <section class="cw-categories py-5">
  <div class="container text-center">

    <h2 class="mb-4">Shop by Category</h2>

    <div class="row">

       <div class="col-md-3">
        <div class="cw-cat-box">
          <a href="products.html?cat=trouser">Trousers</a>
        </div>
      </div>

      <div class="col-md-3">
        <div class="cw-cat-box">
            <a href="products.html?cat=tshirt">T-Shirts</a>
        </div>
      </div>

      <div class="col-md-3">
        <div class="cw-cat-box">
          <a href="products.html?cat=jeans">Jeans</a>
        </div>
      </div>

      <div class="col-md-3">
        <div class="cw-cat-box">
          <a href="products.html?cat=shirt">Shirts</a>
        </div>
      </div>

    </div>

  </div>
</section>

<!-- Lookbook -->
 <section class="cw-lookbook py-5">
  <div class="container text-center">

    <h2 class="mb-5">Our Lookbook</h2>

    <div class="row">

      <div class="col-md-4">
        <img src="images/look1.jpg" class="img-fluid rounded">
      </div>

      <div class="col-md-4">
        <img src="images/look2.jpg" class="img-fluid rounded">
      </div>

      <div class="col-md-4">
        <img src="images/look3.jpg" class="img-fluid rounded">
      </div>

    </div>

  </div>
</section>

<!-- Featured Products -->
 <section class="cw-products py-5 bg-light">
  <div class="container">

    <h2 class="text-center mb-5">Featured Products</h2>

    <div class="row">

      <!-- Product 1 -->
      <div class="col-md-3">
        <div class="cw-product-card">
          <img src="images/shirts/shirt1.jpg" class="img-fluid">
          <h6>T-Shirt</h6>
          <p>₹999</p>
          <a href="#" class="btn btn-dark btn-sm">Buy Now</a>
        </div>
      </div>

      <!-- Product 2 -->
      <div class="col-md-3">
        <div class="cw-product-card">
          <img src="images/jeans/jeans1.jpg" class="img-fluid">
          <h6>Jeans</h6>
          <p>₹1999</p>
          <a href="#" class="btn btn-dark btn-sm">Buy Now</a>
        </div>
      </div>

      <!-- Add more same -->
      
    </div>

  </div>
</section>

<!-- Call to Action -->
<section class="cw-cta text-center text-white">
  <div class="container">
    <h2>Upgrade Your Style Today</h2>
    <a href="products.html" class="btn btn-light mt-3">Shop Now</a>
  </div>
</section>

<!-- visit us-->
<section class="cw-store py-5 bg-light">
  <div class="container text-center">

    <h2 class="mb-5">Visit Our Store</h2>

    <div class="row">

      <div class="col-md-6">
        <img src="images/store/store1.jpeg" class="img-fluid rounded">
      </div>

      <div class="col-md-6">
        <img src="images/store/store2.jpeg" class="img-fluid rounded">
      </div>

    </div>

  </div>
</section>

<!-- Footer -->
<div id="cw-footer"></div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- Include JS -->
<script src="js/include.js"></script>

</body>
